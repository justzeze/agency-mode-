[build]
  base = "eliza-agent/"
  command = "bun run build:frontend"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "23"
  BUN_VERSION = "1.3.0"

[[redirects]]
  from = "/api/*"
  to = "https://eliza-api.votre-domaine.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://eliza-api.votre-domaine.com"
  VITE_WS_URL = "wss://eliza-api.votre-domaine.com"

[context.deploy-preview.environment]
  VITE_API_URL = "https://eliza-api-staging.votre-domaine.com"
  VITE_WS_URL = "wss://eliza-api-staging.votre-domaine.com"
